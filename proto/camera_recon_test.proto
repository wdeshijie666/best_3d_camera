// 重建侧：Hub 通过 gRPC 触发，从 Hub 共享内存读原始帧并回写 echo 区后回调 Hub。
syntax = "proto3";

package camera3d.recon_test.v1;

// 与 Hub CapturePublication.camera_raw_slots 一项对应：按槽位+seq 读 SHM。
message HubRawFrameRef {
  uint32 hub_slot_index = 1;
  uint64 hub_slot_seq = 2;
  uint32 camera_index = 3;
  uint32 burst_frame_index = 4;
  uint32 width = 5;
  uint32 height = 6;
  uint32 pixel_format = 7;
}

message ProcessHubRawRequest {
  string hub_region_name = 1;
  // 兼容旧客户端：仅单槽时填 2–7；新路径应填 repeated hub_raw_frames（与 Hub burst 一致）。
  uint32 hub_slot_index = 2;
  uint64 hub_slot_seq = 3;
  uint64 client_capture_id = 4;
  uint32 width = 5;
  uint32 height = 6;
  uint32 pixel_format = 7;
  // 非空时 Recon 按序读取并落盘全部项；echo 回环仍使用第 0 项载荷。
  repeated HubRawFrameRef hub_raw_frames = 10;
}

message ProcessHubRawReply {
  int32 code = 1;
  string message = 2;
}

service ReconShmLoopbackTest {
  rpc ProcessHubRaw(ProcessHubRawRequest) returns (ProcessHubRawReply);
}
